name: Deploy to Hostinger (manual fallback)

# Primary deploy is now Hostinger's native git integration:
#   - immoprox.io      → ./marketing (static)
#   - app.immoprox.io  → ./ (Vite build of the React CRM)
# This FTPS workflow is kept as a manual fallback — trigger from the
# Actions tab if Hostinger git deploy is unavailable. Not on push to
# avoid double-writes that would stomp the Hostinger git deploy.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Copy .htaccess to dist
        run: cp public/.htaccess dist/.htaccess

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # NOTE: this path targets the app.immoprox.io docroot. On Hostinger
          # subdomains this is typically /domains/app.immoprox.io/public_html/.
          # Adjust if hPanel shows a different path under "File Manager".
          server-dir: /domains/app.immoprox.io/public_html/
          protocol: ftps
